{% extends "base.html" %}

{% block content %}
{% if user %}
    <div class="card">
        <h2>欢迎回来，{{ user.username }}！</h2>
        <div class="user-info">
            <ul class="info-list">
                <li><span class="label">用户名：</span>{{ user.username }}</li>
                <li><span class="label">邮箱：</span>{{ user.email }}</li>
                <li><span class="label">手机：</span>{{ user.phone }}</li>
                <li><span class="label">角色：</span>{{ user.role }}</li>
                <li><span class="label">余额：</span>{{ user.balance }}</li>
            </ul>
        </div>
        <form method="POST" action="/logout" style="display:inline;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="btn btn-primary">退出登录</button>
        </form>
    </div>
{% else %}
    <div class="card">
        <h2>请先登录</h2>
        <p>您尚未登录，请先登录系统。</p>
        <a href="/login" class="btn btn-primary">前往登录</a>
    </div>
{% endif %}
{% endblock %}
