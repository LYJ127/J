{% extends "base.html" %}

{% block content %}
<div class="card profile-card">
    <h2>个人中心</h2>
    <div class="user-info">
        <ul class="info-list">
            <li><span class="label">ID：</span>{{ user.id }}</li>
            <li><span class="label">用户名：</span>{{ user.username }}</li>
            <li><span class="label">邮箱：</span>{{ user.email }}</li>
            <li><span class="label">手机：</span>{{ user.phone }}</li>
            <li><span class="label">余额：</span>{{ user.balance }}</li>
        </ul>
    </div>

    <div class="recharge-section">
        <h3>充值</h3>
        <form method="POST" action="/recharge" class="recharge-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="user_id" value="{{ user.id }}">

            <div class="form-group">
                <label for="amount">充值金额</label>
                <input type="number" id="amount" name="amount" step="0.01" placeholder="请输入金额" required>
            </div>
            <button type="submit" class="btn btn-primary">确认充值</button>
        </form>
    </div>

    <a href="/" class="btn btn-outline" style="margin-top:16px; display:inline-block;">返回首页</a>
</div>
{% endblock %}
